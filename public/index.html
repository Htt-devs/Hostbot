<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HostBot Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .card:hover { transform: translateY(-8px); box-shadow: 0 25px 50px -12px rgb(139 92 246 / 0.3); }
  </style>
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen">
  <!-- Top Bar -->
  <div class="bg-zinc-900 border-b border-zinc-800 px-8 py-5 flex items-center justify-between sticky top-0 z-50">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-gradient-to-br from-violet-600 to-purple-600 rounded-2xl flex items-center justify-center text-3xl shadow-inner">🚀</div>
      <span class="text-3xl font-bold tracking-tighter">HostBot</span>
    </div>

    <div onclick="loginWithDiscord()" class="flex items-center gap-3 bg-zinc-800 hover:bg-zinc-700 px-6 py-3 rounded-3xl cursor-pointer transition-colors">
      <i class="fa-brands fa-discord text-[#5865F2] text-2xl"></i>
      <div id="user-name" class="font-medium">Conectar com Discord</div>
      <div id="user-avatar" class="w-8 h-8 bg-zinc-700 rounded-2xl flex items-center justify-center text-xl">👤</div>
    </div>
  </div>

  <div class="max-w-7xl mx-auto p-8">
    <div class="flex justify-between items-end mb-10">
      <div>
        <h1 class="text-5xl font-bold tracking-tight">Dashboard</h1>
        <p class="text-zinc-400 mt-2 text-xl">Gerencie todos os seus bots hospedados</p>
      </div>
      <button onclick="hospedarNovo()" class="bg-gradient-to-r from-violet-600 to-purple-600 px-8 py-4 rounded-3xl font-semibold flex items-center gap-3 hover:brightness-110 transition">
        <i class="fa-solid fa-plus"></i> Hospedar Novo Bot
      </button>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-3 gap-6 mb-12">
      <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6">
        <p class="text-zinc-400 text-sm">Total de Bots</p>
        <p id="total-bots" class="text-5xl font-bold text-purple-400">0</p>
      </div>
      <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6">
        <p class="text-zinc-400 text-sm">RAM Total Usada</p>
        <p id="total-ram" class="text-5xl font-bold text-emerald-400">0 MB</p>
      </div>
      <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6">
        <p class="text-zinc-400 text-sm">Bots Online</p>
        <p id="online-bots" class="text-5xl font-bold text-emerald-400">0</p>
      </div>
    </div>

    <div id="bots-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

    <div id="empty-state" class="text-center py-24">
      <div class="mx-auto w-32 h-32 bg-gradient-to-br from-violet-500 to-purple-600 rounded-3xl flex items-center justify-center text-8xl mb-8">🚀</div>
      <h3 class="text-4xl font-semibold mb-3">Nenhum bot hospedado ainda</h3>
      <p class="text-zinc-400">Use o comando <span class="font-mono bg-zinc-900 px-4 py-2 rounded-2xl text-violet-400">/host</span> no Discord</p>
    </div>
  </div>

  <script>
    async function loadBots() {
      const res = await fetch('/api/bots');
      const bots = await res.json();
      const container = document.getElementById('bots-container');
      const empty = document.getElementById('empty-state');

      document.getElementById('total-bots').textContent = bots.length;
      document.getElementById('online-bots').textContent = bots.filter(b => b.status === 'online').length;
      document.getElementById('total-ram').textContent = bots.reduce((sum, b) => sum + b.ram, 0) + ' MB';

      if (bots.length === 0) {
        container.classList.add('hidden');
        empty.classList.remove('hidden');
        return;
      }

      container.classList.remove('hidden');
      empty.classList.add('hidden');
      container.innerHTML = '';

      bots.forEach(bot => {
        const card = document.createElement('div');
        card.className = "card bg-zinc-900 border border-zinc-800 rounded-3xl p-8";
        card.innerHTML = `
          <div class="flex justify-between items-start">
            <h3 class="text-2xl font-semibold">${bot.nome}</h3>
            <span class="px-6 py-2 text-xs font-medium rounded-3xl ${bot.status === 'online' ? 'bg-emerald-500 text-white' : 'bg-red-500 text-white'}">
              ${bot.status === 'online' ? '🟢 Online' : '🔴 Offline'}
            </span>
          </div>
          <div class="mt-10 grid grid-cols-2 gap-y-8 text-sm">
            <div><span class="block text-zinc-400 text-xs">RAM</span><span class="text-4xl font-semibold">${bot.ram} MB</span></div>
            <div><span class="block text-zinc-400 text-xs">Principal</span><span class="font-mono text-2xl">${bot.mainFile}</span></div>
          </div>
          <div class="mt-12 flex gap-3">
            <button onclick="controlarBot('${bot.id}', 'start')" class="flex-1 bg-emerald-600 hover:bg-emerald-700 py-4 rounded-3xl font-medium">Iniciar</button>
            <button onclick="controlarBot('${bot.id}', 'stop')" class="flex-1 bg-red-600 hover:bg-red-700 py-4 rounded-3xl font-medium">Parar</button>
            <button onclick="controlarBot('${bot.id}', 'restart')" class="flex-1 bg-amber-600 hover:bg-amber-700 py-4 rounded-3xl font-medium">Reiniciar</button>
          </div>
        `;
        container.appendChild(card);
      });
    }

    async function controlarBot(id, action) {
      await fetch(`/api/bots/\( {id}/ \){action}`, { method: 'POST' });
      loadBots();
    }

    function hospedarNovo() {
      alert('Use o comando /host no Discord para hospedar um novo bot!');
    }

    function loginWithDiscord() {
      document.getElementById('user-name').innerHTML = 'z1shy';
      document.getElementById('user-avatar').innerHTML = `<img src="https://i.imgur.com/5f5zY0Z.png" class="w-8 h-8 rounded-2xl" alt="">`;
      alert('✅ Conectado com Discord com sucesso!');
    }

    setInterval(loadBots, 6000);
    loadBots();
  </script>
</body>
</html>
