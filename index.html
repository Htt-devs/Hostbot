<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Hospedagem</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-950 text-white">
  <div class="min-h-screen p-8">
    <div class="max-w-7xl mx-auto">
      <div class="flex justify-between items-center mb-10">
        <h1 class="text-4xl font-bold bg-gradient-to-r from-purple-500 to-pink-500 bg-clip-text text-transparent">
          HostBot Panel
        </h1>
        <div class="flex items-center gap-4">
          <div class="bg-green-500/20 text-green-400 px-4 py-2 rounded-full text-sm flex items-center gap-2">
            <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
            Online
          </div>
        </div>
      </div>

      <div id="bots-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Cards serão inseridos aqui via JS -->
      </div>
    </div>
  </div>

  <script>
    async function carregarBots() {
      const res = await fetch('/api/bots');
      const bots = await res.json();
      const container = document.getElementById('bots-container');
      container.innerHTML = '';

      bots.forEach(bot => {
        const card = document.createElement('div');
        card.className = `bg-gray-900 border border-gray-800 rounded-2xl p-6 hover:border-purple-500 transition-all`;
        card.innerHTML = `
          <div class="flex justify-between items-start">
            <div>
              <h3 class="text-xl font-semibold">${bot.nome}</h3>
              <p class="text-gray-400 text-sm">por ${bot.usuario}</p>
            </div>
            <span class="px-3 py-1 text-xs rounded-full ${bot.status === 'online' ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'}">
              ${bot.status.toUpperCase()}
            </span>
          </div>
          <div class="mt-6 grid grid-cols-2 gap-4 text-sm">
            <div>
              <p class="text-gray-500">RAM</p>
              <p class="font-mono">${bot.ram} MB</p>
            </div>
            <div>
              <p class="text-gray-500">Principal</p>
              <p class="font-mono">${bot.mainFile}</p>
            </div>
          </div>
          <div class="mt-8 flex gap-3">
            <button onclick="controlarBot('${bot.id}', 'start')" class="flex-1 bg-green-600 hover:bg-green-700 py-3 rounded-xl font-medium">Iniciar</button>
            <button onclick="controlarBot('${bot.id}', 'stop')" class="flex-1 bg-red-600 hover:bg-red-700 py-3 rounded-xl font-medium">Parar</button>
            <button onclick="controlarBot('${bot.id}', 'restart')" class="flex-1 bg-yellow-600 hover:bg-yellow-700 py-3 rounded-xl font-medium">Reiniciar</button>
          </div>
        `;
        container.appendChild(card);
      });
    }

    async function controlarBot(id, acao) {
      await fetch(`/api/bots/\( {id}/ \){acao}`, { method: 'POST' });
      carregarBots();
    }

    // Atualiza a cada 5 segundos
    setInterval(carregarBots, 5000);
    carregarBots();
  </script>
</body>
</html>
